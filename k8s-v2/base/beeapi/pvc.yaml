apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: puzzles-pvc
  namespace: algohive
  labels:
    app.kubernetes.io/name: beeapi-server
    app.kubernetes.io/component: catalog
    app.kubernetes.io/part-of: algohive
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi
  # Sur EKS Auto Mode, le PVC doit cibler une StorageClass basée sur ebs.csi.eks.amazonaws.com.
  storageClassName: auto-ebs-sc
